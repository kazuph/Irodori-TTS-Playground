resolver 127.0.0.11 valid=5s;

server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /presets/ {
        root /usr/share/nginx/html;
    }

    location /voices/ {
        root /usr/share/nginx/html;
    }

    location /api/irodori/ {
        set $irodori http://irodori-tts:8005;
        rewrite ^/api/irodori/(.*) /$1 break;
        proxy_pass $irodori;
        proxy_read_timeout 120s;
    }
}
