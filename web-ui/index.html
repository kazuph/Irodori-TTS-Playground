  {e:"\u{1F910}",d:"\u53E3\u3092\u585E\u304C\u308C\u3066"},{e:"\u{1F60C}",d:"\u5B89\u5835\u3001\u6E80\u8DB3"},{e:"\u{1F914}",d:"\u7591\u554F\u306E\u58F0"}
];

var SECTION_ORDER = [
  {id:"quick", title:"\u{1F3A4} \u7D75\u6587\u5B57\u30B5\u30F3\u30D7\u30EB\uFF08\u30AF\u30EA\u30C3\u30AF\u3067\u5373\u751F\u6210\uFF09", defaultOpen: true},
  {id:"chuuni", title:"\u4E2D\u4E8C\u75C5\u30BB\u30EA\u30D5"},
  {id:"heroine", title:"\u30E9\u30CE\u30D9\u7CFB\u30D2\u30ED\u30A4\u30F3"},
  {id:"asmr", title:"ASMR"},
  {id:"standard", title:"\u6A19\u6E96TTS\uFF08HF\u30B5\u30F3\u30D7\u30EB\uFF09"},
  {id:"emoji", title:"\u7D75\u6587\u5B57\u30B9\u30BF\u30A4\u30EB\u5236\u5FA1\uFF08HF\u30B5\u30F3\u30D7\u30EB\uFF09"},
  {id:"voicedesign", title:"VoiceDesign\uFF08HF\u30B5\u30F3\u30D7\u30EB\uFF09"}
];

function getToggleState(id) {
  try { var s = localStorage.getItem("tts_section_" + id); return s === null ? true : s === "1"; } catch(e) { return true; }
}
function setToggleState(id, open) {
  try { localStorage.setItem("tts_section_" + id, open ? "1" : "0"); } catch(e) {}
}

function toggleSection(id) {
  var content = document.getElementById("content-" + id);
  var toggle = document.getElementById("toggle-" + id);
  var isOpen = !content.classList.contains("collapsed");
  if (isOpen) {
    content.classList.add("collapsed");
    toggle.classList.add("collapsed");
    setToggleState(id, false);
  } else {
    content.classList.remove("collapsed");
    toggle.classList.remove("collapsed");
    setToggleState(id, true);
  }
}

function buildSections() {
  var container = document.getElementById("samples-container");
  container.innerHTML = SECTION_ORDER.map(function(sec) {
    var open = getToggleState(sec.id);
    return '<div class="section-header" onclick="toggleSection(\'' + sec.id + '\')">' +
      '<span class="section-toggle' + (open ? '' : ' collapsed') + '" id="toggle-' + sec.id + '">\u25BC</span>' +
      '<h2>' + sec.title + '</h2></div>' +
      '<div class="section-content' + (open ? '' : ' collapsed') + '" id="content-' + sec.id + '">' +
      '<div id="samples-' + sec.id + '"></div></div>';
  }).join("");
}

function renderQuickSamples() {
  var el = document.getElementById("samples-quick");
  if (!el) return;
  el.className = "quick-grid";
  el.innerHTML = QUICK_SAMPLES.map(function(text, i) {
    return '<div class="quick-item" id="quick-' + i + '" onclick="quickGenerate(' + i + ')">' + text + '</div>';
  }).join("");
}

function quickGenerate(idx) {
  var text = QUICK_SAMPLES[idx];
  var ta = document.getElementById("text");
  ta.value = ta.value ? ta.value + "\n" + text : text;
  var el = document.getElementById("quick-" + idx);
  if (el) el.classList.add("generating");
  generate().then(function() {
    if (el) el.classList.remove("generating");
  });
}

function renderEmojiPalette() {
  document.getElementById("emoji-palette").innerHTML = EMOJIS.map(function(em) {
    return '<button class="emoji-btn" title="' + em.d + '" onclick="insertEmoji(\'' + em.e.replace(/'/g, "\\'") + '\')">' + em.e + '</button>';
  }).join("");
}

function insertEmoji(emoji) {
  var ta = document.getElementById("text");
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  var val = ta.value;
  ta.value = val.substring(0, start) + emoji + val.substring(end);
  var pos = start + emoji.length;
  ta.setSelectionRange(pos, pos);
  ta.focus();
}

document.addEventListener("keydown", function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    generate();
  }
});

function setCaption(el) { document.getElementById("caption").value = el.textContent; }

function switchModel(model) {
  currentModel = model;
  document.getElementById("btn-model-normal").className = model === "normal" ? "active" : "";
  document.getElementById("btn-model-vd").className = model === "voicedesign" ? "active" : "";
  document.getElementById("caption-area").className = model === "voicedesign" ? "caption-area show" : "caption-area";
}

function renderPresets() {
  var groups = {};
  SECTION_ORDER.forEach(function(s) { if (s.id !== "quick") groups[s.id] = []; });
  PRESETS.forEach(function(p, i) { if (groups[p.cat]) groups[p.cat].push(Object.assign({}, p, { id: i })); });
  Object.keys(groups).forEach(function(cat) {
    var items = groups[cat];
    var el = document.getElementById("samples-" + cat);
    if (!el) return;
    el.className = "sample-grid";
    el.innerHTML = items.map(function(p) {
      var captionHtml = p.caption ? '<div class="sample-caption">\u{1F3A4} ' + p.caption + '</div>' : '';
      return '<div class="sample-item">' +
        '<div class="sample-top">' +
          '<button class="sample-play" id="play-' + p.id + '" onclick="togglePlay(' + p.id + ')">&#9654;</button>' +
          '<div class="sample-text" onclick="fillFromPreset(' + p.id + ')">' + PRESETS[p.id].text + '</div>' +
        '</div>' +
        captionHtml +
        '<div class="sample-audio" id="audio-wrap-' + p.id + '">' +
          '<audio id="sample-audio-' + p.id + '" src="' + BASE + '/presets/' + p.file + '" preload="auto" onended="onEnded(' + p.id + ')"></audio>' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

function fillFromPreset(id) {
  var p = PRESETS[id];
  document.getElementById("text").value = p.text;
  if (p.caption) {
    switchModel("voicedesign");
    document.getElementById("caption").value = p.caption;
  }
}

function togglePlay(id) {
  var audio = document.getElementById("sample-audio-" + id);
  var btn = document.getElementById("play-" + id);
  var wrap = document.getElementById("audio-wrap-" + id);
  if (currentlyPlaying !== null && currentlyPlaying !== id) {
    var prev = document.getElementById("sample-audio-" + currentlyPlaying);
    var prevBtn = document.getElementById("play-" + currentlyPlaying);
    if (prev) { prev.pause(); prev.currentTime = 0; }
    if (prevBtn) { prevBtn.className = "sample-play"; prevBtn.innerHTML = "&#9654;"; }
    document.getElementById("audio-wrap-" + currentlyPlaying).style.display = "none";
  }
  if (audio.paused) {
    audio.play(); btn.className = "sample-play playing"; btn.innerHTML = "&#9632;";
    wrap.style.display = "block"; currentlyPlaying = id;
  } else {
    audio.pause(); audio.currentTime = 0; btn.className = "sample-play"; btn.innerHTML = "&#9654;";
    wrap.style.display = "none"; currentlyPlaying = null;
  }
}

function onEnded(id) {
  var btn = document.getElementById("play-" + id);
  if (btn) { btn.className = "sample-play"; btn.innerHTML = "&#9654;"; }
  currentlyPlaying = null;
}

function addHistory(text, caption, audioUrl, elapsed) {
  var now = new Date().toLocaleTimeString("ja-JP");
  var model = caption ? "VoiceDesign" : "\u901A\u5E38\u7248";
  hist.unshift({ text: text, caption: caption, audioUrl: audioUrl, elapsed: elapsed, time: now, model: model });
  document.getElementById("history-list").innerHTML = hist.map(function(h) {
    var captionLine = h.caption ? '<div style="font-size:0.8em;color:#888;font-style:italic;">\u{1F3A4} ' + h.caption + '</div>' : '';
    return '<div class="history-item">' +
      '<div class="meta">' + h.time + ' | ' + h.model + ' | ' + h.elapsed + '\u79D2</div>' +
      '<div style="font-size:0.9em">' + h.text.slice(0, 100) + (h.text.length > 100 ? '...' : '') + '</div>' +
      captionLine +
      '<audio controls src="' + h.audioUrl + '" style="width:100%;margin-top:4px"></audio>' +
    '</div>';
  }).join('');
}

async function generate() {
  var btn = document.getElementById("btn");
  var status = document.getElementById("status");
  var audio = document.getElementById("audio");
  var text = document.getElementById("text").value.trim();
  var steps = parseInt(document.getElementById("steps").value);
  var caption = currentModel === "voicedesign" ? document.getElementById("caption").value.trim() : null;
  if (!text) return;

  var apiPath = currentModel === "voicedesign" ? "/api/voicedesign/v1/tts" : "/api/irodori/v1/tts";
  var body = { text: text, num_steps: steps };
  if (caption) body.caption = caption;

  btn.disabled = true;
  status.textContent = "\u751F\u6210\u4E2D... (" + (currentModel === "voicedesign" ? "VoiceDesign" : "\u901A\u5E38\u7248") + ")";
  var t0 = performance.now();

  try {
    var res = await fetch(BASE + apiPath, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    audio.src = url;
    audio.style.display = "block";
    audio.play();
    status.textContent = "\u751F\u6210\u5B8C\u4E86 (" + elapsed + "\u79D2) [" + (currentModel === "voicedesign" ? "VoiceDesign" : "\u901A\u5E38\u7248") + "]";
    addHistory(text, caption, url, elapsed);
  } catch (e) {
    status.textContent = "\u30A8\u30E9\u30FC: " + e.message;
  }
  btn.disabled = false;
}

buildSections();
renderQuickSamples();
renderPresets();
renderEmojiPalette();
</script>
</body>
</html>
